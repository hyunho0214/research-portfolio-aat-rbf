dataset:
  source: "UCI SECOM / Kaggle mirror"
  positive_label: 1
  negative_label: -1
  missing_column_threshold: 0.50

preprocessing:
  imputers:
    - median
    - knn
    - forward_fill
  variance_thresholds:
    - 0.0
    - 1.0e-8
  feature_selection_top_k:
    - null
    - 30
    - 50
    - 80

imbalance:
  strategies:
    - none
    - class_weight
    - smote

models:
  - dummy
  - logistic_regression
  - random_forest
  - svm_rbf
  - gradient_boosting
  - xgboost

primary_metrics:
  - recall_fail
  - f1_fail
  - pr_auc
  - balanced_accuracy

recommended_first_run:
  imputer: median
  imbalance: smote
  feature_selection_top_k: 50
  models:
    - dummy
    - logistic_regression
    - random_forest
    - gradient_boosting
